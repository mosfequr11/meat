<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Meat Halal html</title>
	<link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
	<main id="MainContent" class="content-for-layout" role="main" tabindex="-1">
		<!-- Hero Section Start -->
		<section class="hero">
			<div class="hero__inner">
				<div class="hero__bg-image">
					<picture>
						<source media="(max-width:769px)" srcset="assets/images/hero-bg-desk1.jpg">
						<source media="(min-width:768px)" srcset="assets/images/hero-bg-desk1.jpg">
						<img src="assets/images/hero-bg-desk1.jpg" alt="herobg">
					</picture>
				</div>
				<div class="hero__content">
					<div class="hero__box-content">
						<h1 class="heading">Premium Halal Meat Delivered.</h1>
						<p class="banner-text">carefully sourced, prepared, and packaged to ensure the utmost<em>
								freshness </em>and<em>
								flavor!</em></p>
						<a class="banner-btn" href="#">
							Build Your Halal Box
							<span>📦</span>
						</a>
					</div>
				</div>
			</div>
		</section>
		<!-- Hero Section End -->

		<!-- Certified Section Start -->
		<section class="certified">
			<div class="certified__inner">
				<div class="certified__items">

					<div class="certified__item">
						<div class="certified__img">
							<img src="assets/images/certified-1.png" alt="">
						</div>
						<div class="certified__content">
							<img src="assets/images/verified-ion.svg" alt="">
							<h3 class="certified__title">Halal-Certified</h3>
						</div>
					</div>
					<div class="certified__item">
						<div class="certified__img">
							<img src="assets/images/certified-2.png" alt="">
						</div>
						<div class="certified__content">
							<img src="assets/images/verified-ion.svg" alt="">
							<h3 class="certified__title">Humanely Raised</h3>
						</div>
					</div>
					<div class="certified__item">
						<div class="certified__img">
							<img src="assets/images/certified-3.png" alt="">
						</div>
						<div class="certified__content">
							<img src="assets/images/verified-ion.svg" alt="">
							<h3 class="certified__title">No Hormones or Antibiotics</h3>
						</div>
					</div>
					<div class="certified__item">
						<div class="certified__img">
							<img src="assets/images/certified-4.png" alt="">
						</div>
						<div class="certified__content">
							<img src="assets/images/verified-ion.svg" alt="">
							<h3 class="certified__title">Hand-Slaughtered</h3>
						</div>
					</div>

				</div>
			</div>
		</section>

		<!-- Certified Section end -->

	</main>
	<script src="assets/js/main.js"></script>
</body>

</html>
